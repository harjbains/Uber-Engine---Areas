<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Birmingham Postcode Trainer</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-soft: #1f2937;
      --text: #f8fafc;
      --muted: #94a3b8;
      --line: #334155;
      --accent: #f97316;
      --accent-soft: rgba(249, 115, 22, 0.18);
      --good: #22c55e;
      --warn: #f59e0b;
      --map-base: #243244;
      --map-outline: #475569;
      --highlight: #f97316;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1e293b 0%, var(--bg) 55%);
      color: var(--text);
      padding: max(10px, env(safe-area-inset-top)) max(10px, env(safe-area-inset-right)) max(90px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left));
    }

    .app {
      width: min(1180px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 370px 1fr;
      gap: 14px;
      align-items: start;
    }

    header {
      grid-column: 1 / -1;
      background: linear-gradient(135deg, rgba(249,115,22,.24), rgba(15,23,42,.8));
      border: 1px solid rgba(249, 115, 22, 0.35);
      border-radius: 22px;
      padding: 16px;
      box-shadow: 0 18px 45px rgba(0,0,0,.28);
    }

    h1 { margin: 0 0 4px; font-size: clamp(1.35rem, 5vw, 2.05rem); }
    header p { margin: 0; color: var(--muted); line-height: 1.35; font-size: .96rem; }

    .card, .map-card, .list-card {
      background: rgba(17, 24, 39, 0.9);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 18px 45px rgba(0,0,0,.28);
      overflow: hidden;
    }

    .trainer { padding: 16px; }

    .mode-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .chip {
      border: 1px solid var(--line);
      background: var(--panel-soft);
      color: var(--text);
      padding: 10px 8px;
      border-radius: 999px;
      font-weight: 850;
      cursor: pointer;
      min-height: 42px;
      font-size: .9rem;
    }

    .chip.active {
      background: var(--accent);
      color: #111827;
      border-color: var(--accent);
    }

    .postcode {
      font-size: clamp(4.4rem, 22vw, 7.2rem);
      font-weight: 950;
      letter-spacing: -0.08em;
      line-height: 0.9;
      margin: 12px 0 8px;
    }

    .areas {
      font-size: clamp(1.08rem, 4.5vw, 1.28rem);
      line-height: 1.25;
      font-weight: 850;
      color: #fff7ed;
      margin-bottom: 12px;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 10px 0 12px;
    }

    .meta-grid.single {
      grid-template-columns: 1fr;
    }

    .meta {
      background: rgba(31, 41, 55, 0.82);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 10px;
    }

    .label {
      font-size: .7rem;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 850;
      letter-spacing: .08em;
      margin-bottom: 4px;
    }

    .value { font-weight: 850; font-size: .96rem; }

    .hook {
      background: var(--accent-soft);
      border: 1px solid rgba(249, 115, 22, 0.38);
      border-radius: 16px;
      padding: 11px;
      color: #fed7aa;
      line-height: 1.35;
      margin-bottom: 12px;
      font-size: .96rem;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    button {
      border: 0;
      border-radius: 16px;
      padding: 13px 12px;
      font-size: 1rem;
      font-weight: 900;
      cursor: pointer;
      color: #111827;
      background: var(--accent);
      min-height: 50px;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    button.secondary { background: #e5e7eb; }
    button.weak { background: #fbbf24; }
    button.known { background: #86efac; }

    .map-card { padding: 14px; }

    .embedded-map {
      margin: 10px 0 12px;
      padding: 10px;
      border-radius: 18px;
      background: rgba(15, 23, 42, 0.72);
    }
    .map-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 10px;
    }

    .map-head h2 { margin: 0; font-size: 1.08rem; }
    .map-head span { color: var(--muted); font-weight: 750; font-size: .88rem; }

    .map-wrap {
      width: 100%;
      overflow: hidden;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: #0b1220;
    }

    svg {
      display: block;
      width: 100%;
      height: min(48vh, 520px);
      min-height: 340px;
      background: #0b1220;
    }

    .zone {
      fill: var(--map-base);
      stroke: var(--map-outline);
      stroke-width: 1.5;
      cursor: pointer;
      transition: fill .18s ease, opacity .18s ease;
    }

    .zone:hover { fill: #334155; }
    .zone.active {
      fill: var(--highlight);
      stroke: #ffedd5;
      stroke-width: 3;
      filter: drop-shadow(0 0 12px rgba(249, 115, 22, .65));
    }

    .zone.dim { opacity: .38; }

    .zone-label {
      pointer-events: none;
      font-size: 13px;
      font-weight: 900;
      fill: #e2e8f0;
      text-anchor: middle;
      dominant-baseline: middle;
      paint-order: stroke;
      stroke: rgba(11, 18, 32, .74);
      stroke-width: 3px;
    }

    .zone-label.active { fill: #111827; stroke: rgba(255, 237, 213, .6); font-size: 18px; }

    .map-source {
      margin: 8px 2px 0;
      color: var(--muted);
      font-size: .72rem;
      line-height: 1.25;
    }

    .compass {
      fill: none;
      stroke: #64748b;
      stroke-width: 2;
      opacity: .72;
    }

    .compass-text {
      fill: #94a3b8;
      font-size: 14px;
      font-weight: 900;
      text-anchor: middle;
    }

    .list-card {
      grid-column: 1 / -1;
      padding: 14px;
    }

    .list-tools {
      display: grid;
      grid-template-columns: 1fr 220px;
      gap: 10px;
      margin-bottom: 12px;
    }

    input, select {
      background: var(--panel-soft);
      border: 1px solid var(--line);
      color: var(--text);
      border-radius: 14px;
      padding: 11px 12px;
      font-weight: 750;
      min-height: 46px;
      width: 100%;
    }

    .postcode-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
      gap: 8px;
    }

    .mini {
      background: rgba(31, 41, 55, .72);
      border: 1px solid var(--line);
      border-radius: 15px;
      padding: 10px;
      cursor: pointer;
      min-height: 78px;
    }

    .mini strong { display: block; font-size: 1.15rem; color: #fed7aa; }
    .mini span { color: var(--muted); font-size: .84rem; line-height: 1.3; }
    .mini.active { border-color: var(--accent); background: var(--accent-soft); }

    .mobile-sticky-actions { display: none; }

    @media (max-width: 880px) {
      body {
        padding: max(8px, env(safe-area-inset-top)) max(8px, env(safe-area-inset-right)) max(92px, env(safe-area-inset-bottom)) max(8px, env(safe-area-inset-left));
      }

      .app {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      header, .list-card { grid-column: 1; }

      header {
        padding: 12px;
        border-radius: 18px;
      }

      header p { font-size: .88rem; }

      .trainer {
        padding: 13px;
        border-radius: 18px;
      }

      .postcode {
        margin-top: 8px;
        font-size: clamp(4.2rem, 28vw, 6.2rem);
      }

      .areas { margin-bottom: 10px; }

      .hook { margin-bottom: 10px; }

      .map-card {
        padding: 10px;
        border-radius: 18px;
      }

      .map-head { margin-bottom: 8px; }
      .map-head h2 { font-size: 1rem; }
      .map-head span { font-size: .82rem; }

      svg {
        height: 42vh;
        min-height: 300px;
      }

      .list-tools {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .postcode-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .desktop-actions {
        display: none;
      }

      .mobile-sticky-actions {
        position: fixed;
        left: max(8px, env(safe-area-inset-left));
        right: max(8px, env(safe-area-inset-right));
        bottom: max(8px, env(safe-area-inset-bottom));
        z-index: 30;
        display: grid;
        grid-template-columns: 1.2fr 1fr 1fr;
        gap: 8px;
        padding: 8px;
        border: 1px solid rgba(148, 163, 184, .32);
        border-radius: 20px;
        background: rgba(15, 23, 42, .92);
        backdrop-filter: blur(14px);
        box-shadow: 0 -12px 35px rgba(0,0,0,.35);
      }

      .mobile-sticky-actions button {
        min-height: 48px;
        padding: 11px 8px;
        border-radius: 14px;
        font-size: .9rem;
      }
    }

    @media (max-width: 430px) {
      .meta-grid {
        grid-template-columns: 1fr;
      }

      .mode-row { gap: 6px; }
      .chip { font-size: .82rem; padding-inline: 6px; }
      .postcode-grid { grid-template-columns: 1fr; }

      svg {
        height: 38vh;
        min-height: 280px;
      }
    }
  </style>
</head>

    <section class="list-card">

          <option>North East</option>
          <option>East</option>
          <option>South East</option>
          <option>South</option>
          <option>South West</option>
          <option>West</option>
          <option>Solihull / Airport side</option>
        </select>
      </div>
      <div class="postcode-grid" id="postcodeGrid"></div>
    </section>
  </main>

  <div class="mobile-sticky-actions">
    <button id="mobileNextBtn">Next</button>
    <button class="known" id="mobileKnownBtn">Knew it</button>
    <button class="weak" id="mobileWeakBtn">Practice</button>

      return list[Math.floor(Math.random() * list.length)];
    }

    function chooseNext() {
      let pool = DATA;
      if (state.mode === 'weak' && state.weak.size > 0) {
        pool = DATA.filter(d => state.weak.has(d.code));
      }
      if (state.mode === 'random') {
        const weighted = [];
        DATA.forEach(d => {
          weighted.push(d);
          if (state.weak.has(d.code)) weighted.push(d, d, d);
          if (!state.known.has(d.code)) weighted.push(d);
        });
        pool = weighted;
      }
      let next = randomFrom(pool);
      if (pool.length > 1) {
        while (next.code === state.current.code) next = randomFrom(pool);
      }
      state.current = next;
      render();
    }

    function sourcePoint(coord) {
      return {
        x: (coord[0] - MAP_SOURCE_PROJECTION.left) * MAP_SOURCE_PROJECTION.sx,
        y: (MAP_SOURCE_PROJECTION.top - coord[1]) * MAP_SOURCE_PROJECTION.sy
      };
    }

    function eachGeoCoord(callback) {
      POSTCODE_GEOJSON.features.forEach(feature => {
        feature.geometry.coordinates.forEach(polygon => {
          polygon.forEach(ring => ring.forEach(coord => callback(coord)));
        });
      });
    }

    function getMapTransform() {
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      eachGeoCoord(coord => {
        const point = sourcePoint(coord);
        minX = Math.min(minX, point.x);
        minY = Math.min(minY, point.y);
        maxX = Math.max(maxX, point.x);
        maxY = Math.max(maxY, point.y);
      });

      const drawableW = MAP_VIEWBOX.width - MAP_VIEWBOX.padding * 2;
      const drawableH = MAP_VIEWBOX.height - MAP_VIEWBOX.padding * 2;
      const scale = Math.min(drawableW / (maxX - minX), drawableH / (maxY - minY));

      const offsetY = (MAP_VIEWBOX.height - (maxY - minY) * scale) / 2;
      return { minX, minY, scale, offsetX, offsetY };
    }

    const mapTransform = getMapTransform();

    function projectCoord(coord) {
      const point = sourcePoint(coord);
      return {
        x: mapTransform.offsetX + (point.x - mapTransform.minX) * mapTransform.scale,
        y: mapTransform.offsetY + (point.y - mapTransform.minY) * mapTransform.scale

        const feature = GEO_FEATURES.get(d.code);
        if (!feature) return;

        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', geoPath(feature));
        path.dataset.code = d.code;
        path.classList.add('zone');
        if (d.code === state.current.code) path.classList.add('active');
        else path.classList.add('dim');
        path.addEventListener('click', () => {
          state.current = d;
          render();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
        els.mapSvg.appendChild(path);
      });

      DATA.forEach(d => {
        const labelCoord = MAP_LABELS[d.code];
        if (!labelCoord) return;
        const point = projectCoord(labelCoord);
        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        text.setAttribute('x', point.x.toFixed(2));
        text.setAttribute('y', point.y.toFixed(2));
        text.textContent = d.code;
        text.classList.add('zone-label');
        if (d.code === state.current.code) text.classList.add('active');
        els.mapSvg.appendChild(text);
      });
    }

    function renderList() {
      const q = els.searchBox.value.trim().toLowerCase();
      const dir = els.directionFilter.value;
      els.postcodeGrid.innerHTML = '';

      DATA
        .filter(d => !dir || d.pos === dir)
        .filter(d => !q || d.code.toLowerCase().includes(q) || d.areas.toLowerCase().includes(q) || d.pos.toLowerCase().includes(q))
        .forEach(d => {
          const item = document.createElement('div');
          item.className = 'mini' + (d.code === state.current.code ? ' active' : '');
          item.innerHTML = `<strong>${d.code}</strong><span>${d.areas}<br>${d.pos}</span>`;
          item.addEventListener('click', () => {
            state.current = d;
            render();
            window.scrollTo({ top: 0, behavior: 'smooth' });
          });
          els.postcodeGrid.appendChild(item);
        });
    }

    function render() {
      els.postcodeText.textContent = state.current.code;
      els.areasText.textContent = state.current.areas.replaceAll(', ', ' • ');
      els.positionText.textContent = state.current.pos;
      els.hookText.textContent = state.current.hook;
      els.mapHint.textContent = `Boundary highlighted: ${state.current.code}`;
      els.scoreText.textContent = `${state.known.size} known / ${state.weak.size} weak`;
      renderMap();
      renderList();
    }

    function setMode(mode) {
      state.mode = mode;
      els.randomMode.classList.toggle('active', mode === 'random');
      els.weakMode.classList.toggle('active', mode === 'weak');
      els.allMode.classList.toggle('active', mode === 'all');
    }

    function markKnown() {
      state.known.add(state.current.code);
      state.weak.delete(state.current.code);
      saveProgress();
      chooseNext();
    }

    function markWeak() {
      state.weak.add(state.current.code);
      state.known.delete(state.current.code);
      saveProgress();
      chooseNext();
    }

    els.nextBtn.addEventListener('click', chooseNext);
    els.knownBtn.addEventListener('click', markKnown);
    els.weakBtn.addEventListener('click', markWeak);
    els.mobileNextBtn.addEventListener('click', chooseNext);
    els.mobileKnownBtn.addEventListener('click', markKnown);
    els.mobileWeakBtn.addEventListener('click', markWeak);

    els.randomMode.addEventListener('click', () => setMode('random'));
    els.weakMode.addEventListener('click', () => setMode('weak'));
    els.allMode.addEventListener('click', () => setMode('all'));
    els.searchBox.addEventListener('input', renderList);
    els.directionFilter.addEventListener('change', renderList);

    render();
  </script>
</body>
</html>
